<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="India LOP - India's Upcoming Social Network. Join the waitlist to be among the first to experience the future of social connectivity.">
    <meta name="keywords" content="India, social network, social media, coming soon, digital future, India LOP">
    <meta name="author" content="India LOP">
    <meta property="og:title" content="India LOP - Coming Soon">
    <meta property="og:description" content="India's Upcoming Social Network. Connecting India's Digital Future.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="India LOP - Coming Soon">
    <meta name="twitter:description" content="India's Upcoming Social Network. Connecting India's Digital Future.">
    
    <title>India LOP - Coming Soon</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-heading: "Montserrat", sans-serif;
            --font-body: "Lato", sans-serif;
            --background: #0d0d0d;
            --foreground: #f2f2f2;
            --primary: #4d9cff;
            --primary-foreground: #fafafa;
            --card-bg: rgba(26, 26, 26, 0.6);
            --card-border: rgba(77, 156, 255, 0.2);
            --glow-blue: #4d9cff;
            --glow-purple: #7f5af0;
            --glow-pink: #ff6b9d;
            --accent: #7f5af0;
            --muted: #404040;
            --muted-foreground: #b3b3b3;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: var(--font-body);
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
        }

        /* Hero Background */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #0d0d0d 100%);
            overflow: hidden;
        }

        .hero-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(77, 156, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(127, 90, 240, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Floating Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(77, 156, 255, 0.5);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Logo */
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
            filter: drop-shadow(0 0 20px rgba(77, 156, 255, 0.5));
        }

        /* Main Title */
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: -2px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            text-shadow: 0 0 30px rgba(77, 156, 255, 0.3);
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--primary);
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
            font-weight: 600;
        }

        /* Description */
        .description {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--muted-foreground);
            margin-bottom: 2.5rem;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
            line-height: 1.8;
        }

        .description .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        /* Waitlist Card */
        .waitlist-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .card-title {
            font-size: 1.75rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--muted-foreground);
            margin-bottom: 1.5rem;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-label {
            font-size: 0.9rem;
            color: var(--muted-foreground);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-input {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(77, 156, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(179, 179, 179, 0.5);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(20, 20, 20, 0.95);
            box-shadow: 0 0 20px rgba(77, 156, 255, 0.2);
        }

        /* Submit Button */
        .submit-btn {
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 0.5rem;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-heading);
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background: #3d8ce8;
            box-shadow: 0 0 30px rgba(77, 156, 255, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Success Message */
        .success-message {
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .success-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .success-text {
            color: var(--muted-foreground);
            font-size: 0.95rem;
        }

        /* Social Links */
        .social-links {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(77, 156, 255, 0.1);
        }

        .social-link {
            display: inline-block;
            color: var(--muted-foreground);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin: 0 0.5rem;
        }

        .social-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Mouse Glow Effect */
        .mouse-glow {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(77, 156, 255, 0.3) 0%, transparent 70%);
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
            width: 100px;
            height: 100px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.25rem;
            }

            .description {
                font-size: 0.95rem;
            }

            .waitlist-card {
                padding: 1.5rem;
            }

            .card-title {
                font-size: 1.25rem;
            }

            .container {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .description {
                font-size: 0.85rem;
            }

            .waitlist-card {
                padding: 1.25rem;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .form-input {
                padding: 0.65rem 0.75rem;
                font-size: 0.95rem;
            }

            .submit-btn {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Background -->
    <div class="hero-background">
        <div class="particles" id="particles"></div>
    </div>

    <!-- Mouse Glow Effect -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Logo (SVG inline) -->
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#4d9cff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#7f5af0;stop-opacity:1" />
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <!-- Background Circle -->
            <circle cx="50" cy="50" r="48" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>
            <!-- Main Symbol - Stylized "I" with glow -->
            <g filter="url(#glow)">
                <rect x="40" y="20" width="20" height="60" rx="4" fill="url(#logoGradient)"/>
                <circle cx="50" cy="15" r="6" fill="url(#logoGradient)"/>
            </g>
            <!-- Accent dots -->
            <circle cx="25" cy="50" r="3" fill="#4d9cff" opacity="0.6"/>
            <circle cx="75" cy="50" r="3" fill="#7f5af0" opacity="0.6"/>
        </svg>

        <!-- Main Title -->
        <h1>India LOP</h1>

        <!-- Subtitle -->
        <div class="subtitle">India's Upcoming Social Network</div>

        <!-- Description -->
        <p class="description">
            Connecting India's Digital Future. <span class="highlight">Coming Soon.</span>
        </p>

        <!-- Waitlist Card -->
        <div class="waitlist-card">
            <div id="formContainer">
                <div class="card-title">Join the Waitlist</div>
                <p class="card-description">Be among the first to experience India LOP.</p>

                <form id="waitlistForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Name</label>
                        <input
                            type="text"
                            id="name"
                            class="form-input"
                            placeholder="Your Name"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="your@example.com"
                            required
                        />
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        Get Early Access
                    </button>
                </form>

                <div class="social-links">
                    <a href="https://instagram.com/getindialop" target="_blank" rel="noopener noreferrer" class="social-link">
                        Instagram
                    </a>
                </div>
            </div>

            <div id="successContainer" style="display: none;">
                <div class="success-message">
                    <div class="success-icon">✨</div>
                    <div class="success-title">Thank You!</div>
                    <p class="success-text">You're on the list. We'll notify you when we launch.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize particles
        function initializeParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth > 768 ? 50 : 25;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 5 + 2;
                const left = Math.random() * 100;
                const duration = Math.random() * 5 + 5;
                const delay = Math.random() * 10;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.bottom = '-10px';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';

                particlesContainer.appendChild(particle);
            }
        }

        // Mouse glow effect
        function initializeMouseGlow() {
            const mouseGlow = document.getElementById('mouseGlow');
            
            document.addEventListener('mousemove', (e) => {
                mouseGlow.style.opacity = '1';
                mouseGlow.style.left = (e.clientX - 50) + 'px';
                mouseGlow.style.top = (e.clientY - 50) + 'px';
            });

            document.addEventListener('mouseleave', () => {
                mouseGlow.style.opacity = '0';
            });
        }

        // Form submission
        function initializeForm() {
            const form = document.getElementById('waitlistForm');
            const submitBtn = document.getElementById('submitBtn');
            const formContainer = document.getElementById('formContainer');
            const successContainer = document.getElementById('successContainer');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;

                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span>Submitting...';

                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 2000));

                // Log the data (in a real app, send to backend)
                console.log('Waitlist signup:', { name, email });

                // Show success state
                submitBtn.disabled = false;
                formContainer.style.display = 'none';
                successContainer.style.display = 'block';
            });
        }

        // Initialize everything on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeParticles();
            initializeMouseGlow();
            initializeForm();
        });

        // Reinitialize particles on window resize
        window.addEventListener('resize', () => {
            const particlesContainer = document.getElementById('particles');
            particlesContainer.innerHTML = '';
            initializeParticles();
        });
    </script>
</body>
</html>
